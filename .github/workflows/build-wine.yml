name: Build Wine WCP

on:
  schedule:
    - cron: '0 6 * * *'   # Check daily at 6 AM UTC
  workflow_dispatch:
    inputs:
      wine_tag:
        description: 'Wine version tag (e.g., "wine-11.0"). Leave blank to auto-detect latest stable.'
        required: false
        default: ''
      arch:
        description: 'Architecture to build'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - x86_64
          - aarch64

permissions:
  contents: write

env:
  # Upstream Wine source
  WINE_REPO: wine-mirror/wine
  # GameNative repo for Android patches and support files
  GAMENATIVE_REPO: GameNative/proton-wine
  GAMENATIVE_BRANCH: proton_10.0
  # Toolchain versions
  NDK_VERSION: '27.3.13750724'
  LLVM_MINGW_VERSION: '20250920'
  LLVM_MINGW_REPO: bylaws/llvm-mingw
  # Termux sysroot (provides Android libraries)
  TERMUXFS_REPO: GameNative/termux-on-gha
  TERMUXFS_TAG: build-20260218
  # Wine prefix files
  PREFIX_REPO: GameNative/bionic-prefix-files

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Detect latest Wine version and check if we need to build
  # ─────────────────────────────────────────────────────────────────────────
  check:
    runs-on: ubuntu-24.04
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      wine_sha: ${{ steps.check.outputs.wine_sha }}
      wine_tag: ${{ steps.check.outputs.wine_tag }}
      wine_version: ${{ steps.check.outputs.wine_version }}
      release_tag: ${{ steps.check.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect Wine version and check for existing release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -n "${{ github.event.inputs.wine_tag || '' }}" ]; then
            # Manual input
            WINE_TAG="${{ github.event.inputs.wine_tag }}"
          else
            # Auto-detect latest stable release (wine-X.0 pattern)
            WINE_TAG=$(gh api "repos/${WINE_REPO}/git/refs/tags" --paginate \
              --jq '.[].ref' \
              | grep -E 'refs/tags/wine-[0-9]+\.0$' \
              | sed 's|refs/tags/||' \
              | sort -t- -k2 -V \
              | tail -1)
            echo "Auto-detected latest stable: ${WINE_TAG}"
          fi

          # Extract version number (e.g., "11.0" from "wine-11.0")
          WINE_VERSION="${WINE_TAG#wine-}"

          WINE_SHA=$(gh api "repos/${WINE_REPO}/commits/${WINE_TAG}" --jq '.sha[:8]')
          DATE=$(date +%Y%m%d)
          RELEASE_TAG="wine-${WINE_VERSION}-build-${DATE}-${WINE_SHA}"

          echo "wine_tag=${WINE_TAG}" >> "$GITHUB_OUTPUT"
          echo "wine_version=${WINE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "wine_sha=${WINE_SHA}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

          if gh release view "${RELEASE_TAG}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Release ${RELEASE_TAG} already exists – skipping."
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Will build: Wine ${WINE_VERSION} (${WINE_TAG}, sha ${WINE_SHA})"
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Build Wine for each architecture
  # ─────────────────────────────────────────────────────────────────────────
  build:
    needs: check
    if: needs.check.outputs.should_build == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    strategy:
      matrix:
        arch: ${{ github.event.inputs.arch == 'x86_64' && fromJson('["x86_64"]') || github.event.inputs.arch == 'aarch64' && fromJson('["aarch64"]') || fromJson('["x86_64", "aarch64"]') }}
      fail-fast: false

    env:
      WINE_SHA: ${{ needs.check.outputs.wine_sha }}
      WINE_TAG: ${{ needs.check.outputs.wine_tag }}
      WINE_VERSION: ${{ needs.check.outputs.wine_version }}
      RELEASE_TAG: ${{ needs.check.outputs.release_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Install build dependencies
        run: sudo bash scripts/setup-deps.sh

      # ── Clone upstream Wine source ──────────────────────────────────────
      - name: Clone upstream Wine
        run: |
          git clone --depth=1 --branch "${WINE_TAG}" \
            "https://github.com/${WINE_REPO}.git" wine-src

      # ── Clone GameNative for Android patches ────────────────────────────
      - name: Clone GameNative patches
        run: |
          git clone --depth=1 --branch "${GAMENATIVE_BRANCH}" \
            "https://github.com/${GAMENATIVE_REPO}.git" gamenative-src
          # Copy Android patches and support files into Wine source tree
          cp -r gamenative-src/android wine-src/android

      # ── Termux sysroot ──────────────────────────────────────────────────
      - name: Download termuxfs
        run: |
          mkdir -p "$HOME/termuxfs/${{ matrix.arch }}"
          cd "$HOME/termuxfs/${{ matrix.arch }}"
          wget -q "https://github.com/${TERMUXFS_REPO}/releases/download/${TERMUXFS_TAG}/termuxfs-${{ matrix.arch }}.tar"
          tar -xf "termuxfs-${{ matrix.arch }}.tar"

      # ── Android NDK ────────────────────────────────────────────────────
      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ~/Android/Sdk/ndk/${{ env.NDK_VERSION }}
          key: android-ndk-r27d

      - name: Setup Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/Android/Sdk/ndk"
          cd "$HOME/Android/Sdk/ndk"
          wget -q https://dl.google.com/android/repository/android-ndk-r27d-linux.zip
          unzip -q android-ndk-r27d-linux.zip
          mv android-ndk-r27d "${{ env.NDK_VERSION }}"

      # ── LLVM MinGW (bylaws fork) ────────────────────────────────────────
      - name: Cache LLVM MinGW
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: ~/toolchains/llvm-mingw-${{ env.LLVM_MINGW_VERSION }}-ucrt-ubuntu-22.04-x86_64
          key: bylaws-llvm-mingw-${{ env.LLVM_MINGW_VERSION }}

      - name: Setup LLVM MinGW
        if: steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/toolchains"
          cd "$HOME/toolchains"
          wget -q "https://github.com/${LLVM_MINGW_REPO}/releases/download/${LLVM_MINGW_VERSION}/llvm-mingw-${LLVM_MINGW_VERSION}-ucrt-ubuntu-22.04-x86_64.tar.xz"
          tar -xf "llvm-mingw-${LLVM_MINGW_VERSION}-ucrt-ubuntu-22.04-x86_64.tar.xz"

      # ── Build Wine ──────────────────────────────────────────────────────
      - name: Run autoreconf
        working-directory: wine-src
        run: |
          # Upstream Wine uses autoreconf instead of autogen.sh
          if [ -f autogen.sh ]; then
            bash autogen.sh
          else
            autoreconf -fi
          fi

      - name: Cache wine-tools
        id: cache-wine-tools
        uses: actions/cache@v4
        with:
          path: wine-src/wine-tools
          key: wine-tools-${{ needs.check.outputs.wine_tag }}-${{ hashFiles('wine-src/configure.ac', 'wine-src/configure') }}

      - name: Build wine-tools
        if: steps.cache-wine-tools.outputs.cache-hit != 'true'
        working-directory: wine-src
        run: |
          mkdir -p wine-tools && cd wine-tools
          ../configure --without-x --without-gstreamer --without-vulkan --without-wayland
          make -j$(nproc) __tooldeps__ nls/all

      - name: Build sysvshm library
        if: matrix.arch == 'aarch64'
        working-directory: wine-src
        run: |
          bash "${{ github.workspace }}/scripts/build-wine.sh" "${{ matrix.arch }}" --build-sysvshm

      - name: Apply Android patches
        working-directory: wine-src
        run: |
          bash "${{ github.workspace }}/scripts/build-wine.sh" "${{ matrix.arch }}" --apply-patches

      - name: Configure Wine
        working-directory: wine-src
        run: |
          bash "${{ github.workspace }}/scripts/build-wine.sh" "${{ matrix.arch }}" --configure

      - name: Build Wine
        working-directory: wine-src
        run: |
          bash "${{ github.workspace }}/scripts/build-wine.sh" "${{ matrix.arch }}" --build

      - name: Install Wine
        working-directory: wine-src
        run: |
          bash "${{ github.workspace }}/scripts/build-wine.sh" "${{ matrix.arch }}" --install

      # ── Package WCP ─────────────────────────────────────────────────────
      - name: Download prefixPack
        run: |
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            wget -q "https://github.com/${PREFIX_REPO}/raw/main/prefixPack-x86_64.txz" \
              -O prefixPack.txz
          else
            wget -q "https://github.com/${PREFIX_REPO}/raw/main/prefixPack-arm64ec.txz" \
              -O prefixPack.txz
          fi

      - name: Package WCP
        env:
          WINE_VERSION: ${{ needs.check.outputs.wine_version }}
        run: |
          bash scripts/pack-wcp.sh "${{ matrix.arch }}"

      - name: Upload WCP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wcp-${{ matrix.arch }}
          path: output/*.wcp*
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Create GitHub Release
  # ─────────────────────────────────────────────────────────────────────────
  release:
    needs: [check, build]
    runs-on: ubuntu-24.04
    if: (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -name "*.wcp" -exec cp {} release/ \;
          find artifacts -name "*.wcp.xz" -exec cp {} release/ \;
          ls -lah release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.check.outputs.release_tag }}
          name: "Wine ${{ needs.check.outputs.wine_version }} (${{ needs.check.outputs.release_tag }})"
          files: release/*
          draft: false
          prerelease: false
          body: |
            ## Wine WCP for GameNative / Winlator

            Based on upstream [Wine](https://www.winehq.org/) ${{ needs.check.outputs.wine_version }} (`${{ needs.check.outputs.wine_tag }}`)
            with Android/Bionic patches from [GameNative/proton-wine](https://github.com/GameNative/proton-wine)

            **Source commit:** `${{ needs.check.outputs.wine_sha }}`

            ### WCP Files
            **Wine type (GameNative):**
            - `wine-${{ needs.check.outputs.wine_version }}-x86_64.wcp` - x86_64 (Box64 containers)
            - `wine-${{ needs.check.outputs.wine_version }}-arm64ec.wcp` - ARM64EC (FEX containers)

            **Wine type (Winlator CMOD / Ludashi):**
            - `wine-${{ needs.check.outputs.wine_version }}-x86_64.wcp.xz`
            - `wine-${{ needs.check.outputs.wine_version }}-arm64ec.wcp.xz`

            ### How to install
            Download the `.wcp` and install via the app's WCP manager.

            ### Patch compatibility
            Android patches from GameNative/proton-wine are applied on a best-effort basis.
            Some patches may not apply cleanly to newer upstream Wine versions.
            Check the build logs for details.

            > Built automatically by [wine-wcp-builder](https://github.com/${{ github.repository }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
